name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any in-progress run for the same branch
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # API routes (app/api/) use runtime request objects and cannot be
      # compiled as part of a static export.  We temporarily move the
      # directory aside so Next.js does not try to include them in the build.
      # The mock-API client (lib/lookup-client.ts) is used client-side instead.
      - name: Remove server-only API routes for static build
        run: mv app/api /tmp/api-backup

      - name: Build static export
        run: npm run build
        env:
          NEXT_STATIC_EXPORT: "true"
          NEXT_PUBLIC_USE_MOCK_API: "true"

      - name: Restore API routes (optional, good hygiene)
        if: always()
        run: mv /tmp/api-backup app/api

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
