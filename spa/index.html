<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SecureScope – Premium Cyber Intelligence Platform" />
  <title>SecureScope – Cyber Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body>

  <!-- ── App Shell ─────────────────────────────────────────────── -->
  <div id="app-shell">

    <!-- Sidebar overlay (mobile tap-to-close) -->
    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Main navigation">

      <!-- Logo -->
      <div class="sidebar__logo">
        <div class="sidebar__logo-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M11 2L19.5 6.5V11C19.5 15.6944 15.6944 19.5 11 19.5C6.30558 19.5 2.5 15.6944 2.5 11V6.5L11 2Z"
              fill="currentColor" opacity="0.18" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M7.5 11L10 13.5L14.5 9" stroke="currentColor" stroke-width="1.75"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="sidebar__logo-text">SecureScope</span>
        <!-- Close button shown only on mobile -->
        <button id="sidebar-close-btn" class="sidebar__close-btn" aria-label="Close navigation">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1

              2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
          </svg>
        </button>
      </div>

      <!-- User card -->
      <div class="sidebar__user-card">
        <div class="sidebar__user-avatar" id="sidebar-user-avatar" aria-hidden="true">JS</div>
        <div class="sidebar__user-info">
          <span class="sidebar__user-name" id="sidebar-user-name">John Smith</span>
          <span class="sidebar__user-email" id="sidebar-user-email">john@example.com</span>
        </div>
        <span class="plan-badge plan-badge--free" id="sidebar-plan-badge">Free</span>
      </div>

      <!-- Main nav -->
      <nav class="sidebar__nav">
        <ul class="sidebar__nav-list" role="list">
          <li>
            <a href="#/dashboard" class="sidebar__nav-link" data-nav="dashboard"
               aria-label="Dashboard">
              <svg class="sidebar__nav-icon" width="16" height="16" viewBox="0 0 16 16"
                   fill="currentColor" aria-hidden="true">
                <path d="M0 0h7v7H0V0zm9 0h7v7H9V0zm0 9h7v7H9V9zM0 16V9h7v7H0z"/>
              </svg>
              Dashboard
            </a>
          </li>
          <li>
            <a href="#/tools" class="sidebar__nav-link" data-nav="tools"
               aria-label="Tools – coming soon">
              <svg class="sidebar__nav-icon" width="16" height="16" viewBox="0 0 16 16"
                   fill="currentColor" aria-hidden="true">
                <path d="M1 0L0 1l2.2 3.081a1 1 0 0 0 .815.419h.07a1 1 0 0 1 .708.293l2.675

                  0 0 1 0-.708z"/>
              </svg>
              Tools
              <span class="sidebar__nav-pill">Soon</span>
            </a>
          </li>
          <li>
            <a href="#/ai" class="sidebar__nav-link" data-nav="ai"
               aria-label="AI Assistant – coming soon">
              <svg class="sidebar__nav-icon" width="16" height="16" viewBox="0 0 16 16"

                  0 0 0-.166.076l-.754.785-.842-1.7a.25.25 0 0 0-.182-.134z"/>
                <path d="M8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994
                  1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02
                  1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019
                  3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0
                  0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783z"/>
              </svg>
              AI Assistant
              <span class="sidebar__nav-pill">Soon</span>
            </a>
          </li>
          <li>
            <a href="#/reports" class="sidebar__nav-link" data-nav="reports"
               aria-label="Reports">
              <svg class="sidebar__nav-icon" width="16" height="16" viewBox="0 0 16 16"
                   fill="currentColor" aria-hidden="true">
                <path d="M5 10.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5zm0-2a.5.5
                  0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h5a.5.5
                  0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5
                  0 0 1-.5-.5z"/>
                <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V2a2 2 0 0 1
                  2-2zm0 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3z"/>
              </svg>
              Reports
            </a>
          </li>
          <li>
            <a href="#/pricing" class="sidebar__nav-link" data-nav="pricing"
               aria-label="Pricing">
              <svg class="sidebar__nav-icon" width="16" height="16" viewBox="0 0 16 16"
                   fill="currentColor" aria-hidden="true">
                <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1zm3.5 3v-.5a3.5
                  3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4h-3.5z"/>
              </svg>
              Pricing
            </a>
          </li>
        </ul>
      </nav>

      <!-- Footer nav (account, settings, sign-out) -->
      <div class="sidebar__footer">
        <a href="#/account" class="sidebar__nav-link" data-nav="account"
           aria-label="Account">
          <svg class="sidebar__nav-icon" width="16" height="16" viewBox="0 0 16 16"
               fill="currentColor" aria-hidden="true">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4
              8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516
              10.68 10.294 10 8 10c-2.294 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
          </svg>
          Account
        </a>
        <a href="#/settings" class="sidebar__nav-link" data-nav="settings"
           aria-label="Settings">
          <svg class="sidebar__nav-icon" width="16" height="16" viewBox="0 0 16 16"
               fill="currentColor" aria-hidden="true">
            <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246

              1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0

              1.873 0 0 0 2.692-1.115l.094-.319z"/>
          </svg>
          Settings
        </a>
        <button class="sidebar__nav-link sidebar__signout-btn" id="sign-out-btn"
                aria-label="Sign out">
          <svg class="sidebar__nav-icon" width="16" height="16" viewBox="0 0 16 16"
               fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0
              1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1
              0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0
              1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z" clip-rule="evenodd"/>
            <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0
              0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0
              0 .708.708l3-3z" clip-rule="evenodd"/>
          </svg>
          Sign out
        </button>
      </div>

    </aside><!-- /sidebar -->

    <!-- ── Right side: topbar + content ────────────────────────── -->
    <div class="content-wrap">

      <!-- Topbar -->
      <header class="topbar" role="banner">
        <button id="menu-btn" class="topbar__menu-btn" aria-label="Open navigation"
                aria-expanded="false" aria-controls="sidebar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
            <rect y="3"    width="18" height="1.5" rx="0.75"/>
            <rect y="8.25" width="18" height="1.5" rx="0.75"/>
            <rect y="13.5" width="18" height="1.5" rx="0.75"/>
          </svg>
        </button>

        <span class="topbar__breadcrumb" id="topbar-breadcrumb" aria-live="polite">
          Dashboard
        </span>

        <div class="topbar__actions">
          <!-- Notification bell -->
          <button class="topbar__icon-btn" id="notif-btn" aria-label="Notifications"
                  title="Notifications">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"
                 aria-hidden="true">
              <path d="M9 1.5a5.25 5.25 0 0 0-5.25 5.25v2.625L2.22 11.03A.75.75 0 0 0
                2.75 12.25h12.5a.75.75 0 0 0 .53-1.22l-1.53-1.655V6.75A5.25 5.25 0 0 0 9
                1.5zm0 15a2 2 0 0 1-1.996-1.875h3.992A2 2 0 0 1 9 16.5z"/>
            </svg>
          </button>

          <!-- Theme toggle -->
          <button class="topbar__icon-btn" id="theme-btn"
                  aria-label="Toggle colour theme" title="Toggle theme">
            <!-- Sun icon (shown in dark mode) -->
            <svg class="icon--sun" width="18" height="18" viewBox="0 0 18 18"
                 fill="currentColor" aria-hidden="true">
              <circle cx="9" cy="9" r="3.25"/>
              <g stroke="currentColor" stroke-width="1.25" stroke-linecap="round"
                 fill="none">
                <line x1="9" y1="1.25" x2="9" y2="3"/>
                <line x1="9" y1="15"   x2="9" y2="16.75"/>
                <line x1="1.25" y1="9" x2="3"  y2="9"/>
                <line x1="15"   y1="9" x2="16.75" y2="9"/>
                <line x1="3.4"  y1="3.4"  x2="4.65" y2="4.65"/>
                <line x1="13.35" y1="13.35" x2="14.6" y2="14.6"/>
                <line x1="14.6" y1="3.4"  x2="13.35" y2="4.65"/>
                <line x1="4.65" y1="13.35" x2="3.4"  y2="14.6"/>
              </g>
            </svg>
            <!-- Moon icon (shown in light mode) -->
            <svg class="icon--moon" width="18" height="18" viewBox="0 0 18 18"
                 fill="currentColor" aria-hidden="true">
              <path d="M9 1.5a7.5 7.5 0 1 0 6.9 10.44A5.5 5.5 0 0 1 9 1.5z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- View container — rendered by JS -->
      <main id="view" class="view" role="main" aria-live="polite">
        <!-- Initial loading spinner -->
        <div class="loading-state">
          <div class="spinner" aria-label="Loading content…"></div>
        </div>
      </main>

    </div><!-- /content-wrap -->
  </div><!-- /app-shell -->

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"
       role="region" aria-label="Notifications" aria-live="polite" aria-atomic="false">
  </div>

  <!-- App entry point (ES module) -->
  <script type="module" src="./assets/js/main.js"></script>

</body>
</html>
