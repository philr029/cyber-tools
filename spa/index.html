<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="SecureScope Toolkit Dashboard - cyber, IT, automation, Microsoft 365, web, and troubleshooting tools."
  />
  <title>SecureScope Toolkit Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body>
  <div id="app-shell">
    <div id="mobile-menu-overlay" class="sidebar-overlay" aria-hidden="true"></div>

    <aside
      id="mobile-menu"
      class="sidebar sidebar--mobile-nav"
      role="navigation"
      aria-label="Mobile navigation"
    >
      <div class="sidebar__logo">
        <a href="#/home" class="sidebar__logo-link">
          <span class="sidebar__logo-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M10 1.5 17.5 5v4.625c0 4.144-3.356 7.5-7.5 7.5-4.142 0-7.5-3.356-7.5-7.5V5L10 1.5Z"
                opacity=".2"
              />
              <path d="m6.5 9.75 2.2 2.2 4.8-4.8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span class="sidebar__logo-text">SecureScope</span>
        </a>
        <button id="mobile-menu-close-btn" class="sidebar__close-btn" aria-label="Close menu">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M4.22 4.22a.75.75 0 0 1 1.06 0L8 6.94l2.72-2.72a.75.75 0 1 1 1.06 1.06L9.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L8 9.06l-2.72 2.72a.75.75 0 0 1-1.06-1.06L6.94 8 4.22 5.28a.75.75 0 0 1 0-1.06Z" />
          </svg>
        </button>
      </div>

      <nav class="sidebar__nav">
        <ul class="sidebar__nav-list" role="list">
          <li><a href="#/home" class="sidebar__nav-link" data-route="/home">Home</a></li>
          <li><a href="#/web-tools" class="sidebar__nav-link" data-route="/web-tools">Web Tools</a></li>
          <li><a href="#/cyber-tools" class="sidebar__nav-link" data-route="/cyber-tools">Cyber Tools</a></li>
          <li><a href="#/microsoft-365-tools" class="sidebar__nav-link" data-route="/microsoft-365-tools">Microsoft 365 Tools</a></li>
          <li><a href="#/domain-ip-tools" class="sidebar__nav-link" data-route="/domain-ip-tools">Domain/IP Tools</a></li>
          <li><a href="#/automation-tools" class="sidebar__nav-link" data-route="/automation-tools">Automation Tools</a></li>
          <li><a href="#/phone-lead-testing-tools" class="sidebar__nav-link" data-route="/phone-lead-testing-tools">Phone/Lead Testing</a></li>
          <li><a href="#/about" class="sidebar__nav-link" data-route="/about">About</a></li>
        </ul>
      </nav>
    </aside>

    <div class="content-wrap">
      <header class="topbar topbar--nav" role="banner">
        <a href="#/home" class="topbar__brand" aria-label="Go to home">
          <span class="topbar__brand-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M10 1.5 17.5 5v4.625c0 4.144-3.356 7.5-7.5 7.5-4.142 0-7.5-3.356-7.5-7.5V5L10 1.5Z"
                opacity=".2"
              />
              <path d="m6.5 9.75 2.2 2.2 4.8-4.8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span>SecureScope Toolkit</span>
        </a>

        <nav class="topbar__nav" aria-label="Main navigation">
          <a href="#/home" class="topbar__nav-link" data-route="/home">Home</a>
          <a href="#/web-tools" class="topbar__nav-link" data-route="/web-tools">Web Tools</a>
          <a href="#/cyber-tools" class="topbar__nav-link" data-route="/cyber-tools">Cyber Tools</a>
          <a href="#/microsoft-365-tools" class="topbar__nav-link" data-route="/microsoft-365-tools">Microsoft 365</a>
          <a href="#/domain-ip-tools" class="topbar__nav-link" data-route="/domain-ip-tools">Domain/IP</a>
          <a href="#/automation-tools" class="topbar__nav-link" data-route="/automation-tools">Automation</a>
          <a href="#/phone-lead-testing-tools" class="topbar__nav-link" data-route="/phone-lead-testing-tools">Phone/Lead</a>
          <a href="#/about" class="topbar__nav-link" data-route="/about">About</a>
        </nav>

        <div class="topbar__actions">
          <button class="topbar__icon-btn" id="theme-btn" aria-label="Toggle color theme" title="Toggle theme">
            <svg class="icon--sun" width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
              <circle cx="9" cy="9" r="3.25" />
              <g stroke="currentColor" stroke-width="1.25" stroke-linecap="round" fill="none">
                <line x1="9" y1="1.25" x2="9" y2="3" />
                <line x1="9" y1="15" x2="9" y2="16.75" />
                <line x1="1.25" y1="9" x2="3" y2="9" />
                <line x1="15" y1="9" x2="16.75" y2="9" />
                <line x1="3.4" y1="3.4" x2="4.65" y2="4.65" />
                <line x1="13.35" y1="13.35" x2="14.6" y2="14.6" />
                <line x1="14.6" y1="3.4" x2="13.35" y2="4.65" />
                <line x1="4.65" y1="13.35" x2="3.4" y2="14.6" />
              </g>
            </svg>
            <svg class="icon--moon" width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
              <path d="M9 1.5a7.5 7.5 0 1 0 6.9 10.44A5.5 5.5 0 0 1 9 1.5z" />
            </svg>
          </button>

          <button
            id="menu-btn"
            class="topbar__menu-btn"
            aria-label="Open navigation"
            aria-expanded="false"
            aria-controls="mobile-menu"
          >
            <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
              <rect y="3" width="18" height="1.5" rx="0.75" />
              <rect y="8.25" width="18" height="1.5" rx="0.75" />
              <rect y="13.5" width="18" height="1.5" rx="0.75" />
            </svg>
          </button>
        </div>
      </header>

      <main id="view" class="view" role="main" aria-live="polite">
        <div class="loading-state">
          <div class="spinner" aria-label="Loading content..."></div>
        </div>
      </main>
    </div>
  </div>

  <div
    id="toast-container"
    class="toast-container"
    role="region"
    aria-label="Notifications"
    aria-live="polite"
    aria-atomic="false"
  ></div>

  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
